name: GitHub Profile Summary Cards

on:
  schedule:
    # Regenerate the summary cards every day at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-profile-summary-cards
    steps:
      - uses: actions/checkout@v4
      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          # The built-in GITHUB_TOKEN generates the language and productive-time
          # cards, but NOT the stats or profile-details cards — those need
          # contributionsCollection access and fail with
          # "Resource not accessible by integration".
          # To also get those two cards: create a classic PAT (public_repo + read:user),
          # store it as repo secret SUMMARY_GITHUB_TOKEN, and this line auto-uses it.
          GITHUB_TOKEN: ${{ secrets.SUMMARY_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          BRANCH_NAME: "main"
          UTC_OFFSET: "2"
          EXCLUDE_REPOS: "jonathan-vella,github-readme-stats"
          THEME: "tokyonight"
          AUTO_PUSH: true
